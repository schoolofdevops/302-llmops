apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"    # kube-prometheus-stack auto-discovers this
data:
  vllm-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": {"list": []},
      "description": "Smile Dental LLM Pipeline — vLLM 0.9.1 metrics",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "P95 TTFT",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "P50 TTFT",
              "refId": "B"
            }
          ],
          "title": "Time to First Token — TTFT (P50 / P95)",
          "description": "TTFT: time from request received to first token generated. Measures prompt processing speed. High TTFT = prompt too long or model overloaded.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(vllm:time_per_output_token_seconds_bucket[5m]))",
              "legendFormat": "P95 TPOT",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, rate(vllm:time_per_output_token_seconds_bucket[5m]))",
              "legendFormat": "P50 TPOT",
              "refId": "B"
            }
          ],
          "title": "Time Per Output Token — TPOT (P50 / P95)",
          "description": "TPOT: average time to generate each successive token after the first. Measures decode speed. TPOT = 1/throughput_per_request. High TPOT = slow generation, KV cache pressure, or CPU saturation.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(vllm:e2e_request_latency_seconds_bucket[5m]))",
              "legendFormat": "P95 E2E Latency",
              "refId": "A"
            }
          ],
          "title": "End-to-End Request Latency (P95)",
          "description": "E2E latency = TTFT + (TPOT × output_tokens). The total wall-clock time a user waits for a complete response.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [
            {
              "expr": "rate(vllm:generation_tokens_total[1m])",
              "legendFormat": "Generation tokens/sec",
              "refId": "A"
            }
          ],
          "title": "Token Throughput (generation tokens/sec)",
          "description": "Total generation tokens produced per second across all requests. This is the system-level throughput — not per-request TPOT.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 5,
          "targets": [
            {
              "expr": "vllm:num_requests_running",
              "legendFormat": "Running (in-flight)",
              "refId": "A"
            },
            {
              "expr": "vllm:num_requests_waiting",
              "legendFormat": "Waiting (queue depth)",
              "refId": "B"
            }
          ],
          "title": "Active & Queued Requests — KEDA autoscaling signal",
          "description": "Queue depth (Waiting > 0 sustained) is the primary KEDA trigger for autoscaling in Lab 10. Running=1 is normal for max-num-seqs=1 (CPU). If Waiting spikes and stays high, the model needs more replicas.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "max": 1, "min": 0}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 6,
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "KV Cache %",
              "refId": "A"
            }
          ],
          "title": "KV Cache Utilization",
          "description": "Fraction of KV cache in use (metric: vllm:gpu_cache_usage_perc — vLLM 0.9.1 uses this name even on CPU). Set by VLLM_CPU_KVCACHE_SPACE=2 (2 GB). If this approaches 1.0, vLLM will OOM or start rejecting requests. Keep below 80%.",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "id": 7,
          "targets": [
            {
              "expr": "rate(retriever_search_requests_total[1m])",
              "legendFormat": "Retriever Queries/sec",
              "refId": "A"
            }
          ],
          "title": "RAG Retriever Query Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "id": 8,
          "targets": [
            {
              "expr": "rate(chat_requests_total{status=\"ok\"}[1m])",
              "legendFormat": "Chat Requests/sec (ok)",
              "refId": "A"
            },
            {
              "expr": "rate(chat_requests_total{status=~\".*error.*\"}[1m])",
              "legendFormat": "Errors/sec",
              "refId": "B"
            }
          ],
          "title": "Chat Request Rate (Chainlit)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "id": 9,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(chat_latency_seconds_bucket[5m]))",
              "legendFormat": "P95 Chat Latency",
              "refId": "A"
            }
          ],
          "title": "Chat End-to-End Latency (P95)",
          "description": "Full pipeline: RAG retrieval + prompt build + vLLM generation. Higher than vLLM E2E latency by the retrieval overhead.",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["llmops", "vllm", "smollm2"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Smile Dental — LLM Pipeline",
      "uid": "smile-dental-llm",
      "version": 2
    }
