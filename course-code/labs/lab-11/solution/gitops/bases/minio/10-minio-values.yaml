# MinIO Helm values for chart minio-official/minio 5.4.0
# Source: helm show values minio-official/minio (chart 5.4.0)
#
# IMPORTANT: These are course-grade credentials (demo only, not production).
# Never use minio/minio123 in a production environment.
# Tested with: helm install minio minio-official/minio --namespace minio -f this-file.yaml
#
# Pitfall: ALWAYS pass both mode: standalone AND replicas: 1
# Without replicas: 1, chart v5.4.0 may deploy a StatefulSet with 16 replicas.
# Verified: mode=standalone + replicas=1 produces a Deployment (not StatefulSet) with 1 replica.

mode: standalone
replicas: 1

rootUser: minio
rootPassword: minio123

resources:
  requests:
    memory: 512Mi
  limits:
    memory: 1Gi

persistence:
  enabled: true
  size: 2Gi

service:
  type: NodePort
  nodePort: 30900

consoleService:
  type: NodePort
  nodePort: 30901
