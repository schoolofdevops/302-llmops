# Lab 11: Child Application — Chainlit UI
# Sync wave 10: deploys after vLLM and observability stack is ready
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chainlit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: <ARGOCD_REPO_URL>
    targetRevision: HEAD
    path: course-code/labs/lab-11/solution/gitops/bases/chainlit
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
