# Lab 06: Prometheus ServiceMonitor for Chainlit UI
# Chainlit's catch-all route intercepts /metrics on port 8000, so the app
# runs a separate prometheus_client HTTP server on port 9090.
# Metrics: chat_requests_total, chat_latency_seconds
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chainlit-monitor
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - llm-app
  selector:
    matchLabels:
      app: chainlit-ui
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
