# Lab 05: Chainlit NodePort Service
# Access: http://localhost:30300
apiVersion: v1
kind: Service
metadata:
  name: chainlit-ui
  namespace: llm-app
  labels:
    app: chainlit-ui
spec:
  type: NodePort
  selector:
    app: chainlit-ui
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30300
