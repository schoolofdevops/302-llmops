apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-agent-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  agent-overview.json: |
    {
      "title": "Smile Dental — Agent Overview",
      "uid": "smile-dental-agent",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "LLM tokens / sec by direction",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum by (direction) (rate(agent_llm_tokens_total[1m]))",
              "legendFormat": "{{direction}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Cumulative LLM cost (USD)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(agent_llm_cost_usd_total)",
              "legendFormat": "USD"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD"}}
        },
        {
          "id": 3,
          "title": "Per-tool span duration (Tempo)",
          "type": "traces",
          "datasource": {"type": "tempo", "uid": "tempo"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "queryType": "search",
              "service": "mcp-triage",
              "limit": 20
            }
          ]
        },
        {
          "id": 4,
          "title": "Recent agent traces (Tempo search by service)",
          "type": "traces",
          "datasource": {"type": "tempo", "uid": "tempo"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "targets": [
            {
              "queryType": "search",
              "service": "mcp-treatment-lookup",
              "limit": 20
            }
          ]
        }
      ]
    }
