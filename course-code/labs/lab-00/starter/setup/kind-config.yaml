# kind-config.yaml — LLMOps Course KIND Cluster Configuration
#
# BEFORE USE: Replace the hostPath placeholder below with the absolute path to your project directory.
# Example (macOS):  /Users/yourname/llmops-project
# Example (Linux):  /home/yourname/llmops-project
# Example (Windows Git Bash):  /c/Users/yourname/llmops-project
#
# The bootstrap script will prompt you for this path automatically.
# See Lab 00 instructions for details.

# ImageVolume feature gate is enabled in TWO places (both required):
# 1. kubeadmConfigPatches — API server, controller-manager, scheduler
# 2. KubeletConfiguration — kubelet on each node
# Enabling only one place silently fails (pods run but volume is empty).
# Local registry: kind-registry:5001 must be running before creating the cluster.
# The bootstrap script handles starting and connecting it automatically.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."kind-registry:5001"]
      endpoint = ["http://kind-registry:5001"]

kubeadmConfigPatches:
  - |
    apiVersion: kubeadm.k8s.io/v1beta3
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        feature-gates: "ImageVolume=true"
    controllerManager:
      extraArgs:
        feature-gates: "ImageVolume=true"
    scheduler:
      extraArgs:
        feature-gates: "ImageVolume=true"
  - |
    apiVersion: kubelet.config.k8s.io/v1beta1
    kind: KubeletConfiguration
    featureGates:
      ImageVolume: true

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: llmops-kind
nodes:
- role: control-plane
  image: kindest/node:v1.34.0
  extraMounts:
    - hostPath: REPLACE_HOST_PATH
      containerPath: /mnt/project
  extraPortMappings:
  - containerPort: 30000
    hostPort: 30000
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 32000
    hostPort: 32000
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 8000
    hostPort: 8000
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 80
    hostPort: 80
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 443
    hostPort: 443
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30080
    hostPort: 30080
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30090
    hostPort: 30090
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30100
    hostPort: 30100
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30200
    hostPort: 30200
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30300
    hostPort: 30300
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30400
    hostPort: 30400
    listenAddress: "0.0.0.0"
    protocol: tcp
  - containerPort: 30500
    hostPort: 30500
    listenAddress: "0.0.0.0"
    protocol: tcp
- role: worker
  image: kindest/node:v1.34.0
  extraMounts:
    - hostPath: REPLACE_HOST_PATH
      containerPath: /mnt/project
- role: worker
  image: kindest/node:v1.34.0
  extraMounts:
    - hostPath: REPLACE_HOST_PATH
      containerPath: /mnt/project
