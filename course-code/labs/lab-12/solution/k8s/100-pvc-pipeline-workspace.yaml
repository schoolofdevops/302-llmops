# Lab 12: Shared workspace PVC for inter-step artifact passing.
# RWO is fine on single-node KIND (Open Q6). All DAG steps mount /workspace.
# Avoids MinIO/S3 artifact repository requirement (Pitfall 5).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipeline-workspace
  namespace: argo
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
