# Egress allow-list for Hermes Agent pods (D-07).
# NOTE: KIND default CNI (kindnet v1.34+) DOES enforce NetworkPolicy in current versions.
# In production this policy is enforced by any standard CNI (Calico, Cilium, kindnet).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agent-egress
  namespace: llm-agent
spec:
  podSelector:
    matchLabels:
      app: hermes-agent
  policyTypes:
  - Egress
  - Ingress
  ingress:
  # Sandbox Router AND cost-middleware (Lab 09) reach Hermes pods on the API port.
  - from:
    - podSelector:
        matchLabels:
          app: sandbox-router
    - podSelector:
        matchLabels:
          app: cost-middleware
    ports:
    - port: 8642
      protocol: TCP
  egress:
  # 1. DNS — UDP+TCP 53 (REQUIRED — see RESEARCH.md Pitfall 7; without this all DNS breaks).
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # 2. RAG retriever (in-cluster, llm-app namespace).
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: llm-app
      podSelector:
        matchLabels:
          app: rag-retriever
    ports:
    - port: 8001
      protocol: TCP
  # 3. HTTPS to Groq + Gemini APIs (FQDN-pinning needs Cilium; we allow all 443/TCP egress).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 443
      protocol: TCP
  # 4. MCP tool servers in llm-agent (in-namespace traffic).
  - to:
    - podSelector:
        matchLabels:
          app: mcp-triage
    - podSelector:
        matchLabels:
          app: mcp-treatment-lookup
    - podSelector:
        matchLabels:
          app: mcp-book-appointment
    ports:
    - port: 8010
      protocol: TCP
    - port: 8020
      protocol: TCP
    - port: 8030
      protocol: TCP
  # 5. OTEL Collector in monitoring namespace (Lab 09 trace export — for treatment_lookup → retriever spans).
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 4317
      protocol: TCP
    - port: 4318
      protocol: TCP
