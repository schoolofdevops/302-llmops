# Day 2 Chainlit Deployment — replaces lab-05's 40-deploy-chainlit.yaml.
# Routes through Sandbox Router instead of vLLM directly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainlit-ui
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chainlit-ui
  template:
    metadata:
      labels:
        app: chainlit-ui
    spec:
      containers:
      - name: chainlit
        image: localhost:5001/smile-dental-ui-day2:v1.0.0
        env:
        - name: AGENT_URL
          value: "http://sandbox-router-svc.llm-agent.svc.cluster.local:8080"
        - name: HERMES_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-api-secret-chainlit
              key: api-key
              optional: true
        ports:
        - name: http
          containerPort: 8000
        - name: metrics
          containerPort: 9090
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
# Service (NodePort 30300 — same as Lab 05)
apiVersion: v1
kind: Service
metadata:
  name: chainlit-ui
  namespace: llm-app
spec:
  type: NodePort
  selector:
    app: chainlit-ui
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30300
  - name: metrics
    port: 9090
    targetPort: 9090
