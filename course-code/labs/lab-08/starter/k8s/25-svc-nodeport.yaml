# Separate NodePort Service for KServe InferenceService
# IMPORTANT: KServe RawDeployment mode continuously reconciles the auto-generated
# predictor Service back to ClusterIP — patching it does NOT persist.
#
# This separate Service selects predictor pods via the KServe label and exposes
# the API on a stable NodePort. Apply AFTER the InferenceService reaches READY=True.
#
# Verify:
#   kubectl get svc smollm2-nodeport -n llm-serving
#   curl http://localhost:30202/v1/models
apiVersion: v1
kind: Service
metadata:
  name: smollm2-nodeport
  namespace: llm-serving
spec:
  type: NodePort
  selector:
    # TODO: KServe label that identifies the predictor pods — format: serving.kserve.io/inferenceservice: <name>
    serving.kserve.io/inferenceservice: smollm2
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30202  # TODO: must match the NodePort reserved in kind-config.yaml (Phase 05 uses 30202)
      protocol: TCP
