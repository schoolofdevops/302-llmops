# vllm-stack Helm chart values — Lab 07: vLLM Router + Multi-Pod Serving
# Chart version: 0.1.11  (0.1.11 adds routerSpec.nodePort; do NOT use 0.1.10)
# Router image:  lmcache/lmstack-router:v0.1.11  (amd64-only; Rosetta required on Apple Silicon)
#
# CRITICAL — requestGPU must be 0 on this CPU-only KIND cluster.
# Omitting requestGPU (or leaving the default 1) causes backends to stay Pending
# indefinitely because no nvidia.com/gpu resource exists on any node.
#
# Model is downloaded at pod start by the initContainer from MinIO into an emptyDir
# volume at /model. The vLLM server command then runs `vllm serve /model ...`.

# ---------------------------------------------------------------------------
# Backend (serving engine) configuration
# ---------------------------------------------------------------------------
servingEngineSpec:
  runtimeClassName: ""          # No GPU runtime class — CPU-only KIND cluster

  modelSpec:
  - name: "smollm2"
    repository: "schoolofdevops/vllm-cpu-nonuma"
    tag: "0.9.1"
    modelURL: "/model"          # Local path — model downloaded by initContainer below

    replicaCount: 2             # Two backend replicas (KEDA manages scaling 1-3)

    requestCPU: 4
    requestMemory: "4Gi"
    requestGPU: 0               # Zero GPU — required for CPU-only KIND (default is 1)

    vllmConfig:
      maxModelLen: 4096
      dtype: "float32"
      maxNumSeqs: 1
      extraArgs:
        - "--disable-frontend-multiprocessing"    # Required for CPU mode (avoids OOM)
        - "--served-model-name=smollm2-135m-finetuned"

    env:
    - name: VLLM_TARGET_DEVICE
      value: "cpu"
    - name: VLLM_CPU_KVCACHE_SPACE
      value: "2"                # CRITICAL: do not raise to 4 — OOM on KIND nodes
    - name: OMP_NUM_THREADS
      value: "4"
    - name: VLLM_CPU_OMP_THREADS_BIND
      value: "auto"

    # initContainer downloads the fine-tuned model from MinIO before vLLM starts
    initContainer:
      name: model-download
      image: "quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z"
      command:
        - sh
        - -c
        - |
          set -euo pipefail
          echo "Configuring MinIO alias..."
          mc alias set minio http://minio.minio:9000 minio minio123
          echo "Downloading model from MinIO..."
          mc cp --recursive minio/models/smollm2-finetuned/ /model/
          echo "Writing sentinel file..."
          touch /model/READY
          echo "Model download complete."
      resources:
        requests:
          cpu: 200m
          memory: 128Mi
          ephemeral-storage: 1Gi
        limits:
          cpu: 500m
          memory: 256Mi
          ephemeral-storage: 2Gi
      mountPvcStorage: false      # Use emptyDir (defined in extraVolumes), not PVC
      extraVolumeMounts:
      - name: model
        mountPath: /model

    # emptyDir volume for model files shared between initContainer and vLLM container
    extraVolumes:
    - name: model
      emptyDir:
        sizeLimit: 1Gi

    # Mount the same emptyDir into the vLLM main container at /model
    extraVolumeMounts:
    - name: model
      mountPath: /model

    # KEDA autoscaling — ScaledObject is generated by the chart when enabled: true
    keda:
      enabled: true
      minReplicaCount: 1
      maxReplicaCount: 3
      pollingInterval: 15
      cooldownPeriod: 360
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
            metricName: "vllm:num_requests_waiting"
            query: 'sum(vllm:num_requests_waiting{model="smollm2"})'
            threshold: "5"

# ---------------------------------------------------------------------------
# Router configuration
# ---------------------------------------------------------------------------
routerSpec:
  repository: "lmcache/lmstack-router"
  tag: "v0.1.11"                # Pinned — never use latest
  imagePullPolicy: "IfNotPresent"

  replicaCount: 1               # Single router pod

  routingLogic: "session"       # session = sticky routing per x-user-id header
  sessionKey: "x-user-id"      # Header used for session affinity

  serviceType: NodePort
  nodePort: 30201               # Requires chart 0.1.11 — absent in 0.1.10
  servicePort: 80
  containerPort: 8000

  engineScrapeInterval: 15      # How often router polls backend /metrics (seconds)
  requestStatsWindow: 60        # Rolling window for request stats (seconds)

  resources:
    requests:
      cpu: 400m
      memory: 1000Mi
    limits:
      memory: 1000Mi
